<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>


<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="logo">
HouseHunt

<ul class="nav-links">

<span id="userName"></span>
<button onclick="logoutUser()" class="logout-btn">
Logout
</button></div></li></ul></nav>
</header>


<!-- PROPERTY PAGE -->

<section class="property-page">


<!-- IMAGE SLIDER -->

<div class="property-gallery">

<button class="slider-btn left" onclick="prevImage()">❮</button>

<img id="propertyImage">

<button class="slider-btn right" onclick="nextImage()">❯</button>

</div>



<!-- PROPERTY DETAILS -->

<div class="property-details" id="propertyDetails"></div>

</section>



<!-- SCRIPTS -->

<script src="js/properties.js"></script>
<script src="js/user.js"></script>

<script>

/* GET PROPERTY ID */

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const property = properties.find(p => p.id == id);


/* IF PROPERTY NOT FOUND */

if(!property){

document.getElementById("propertyDetails").innerHTML="<h2>Property Not Found</h2>";

throw new Error("Property not found");

}


/* IMAGE SLIDER */

let currentImage = 0;

const imageElement = document.getElementById("propertyImage");

imageElement.src = property.gallery[0];


function nextImage(){

currentImage++;

if(currentImage >= property.gallery.length){

currentImage = 0;

}

imageElement.src = property.gallery[currentImage];

}


function prevImage(){

currentImage--;

if(currentImage < 0){

currentImage = property.gallery.length - 1;

}

imageElement.src = property.gallery[currentImage];

}


/* LOAD PROPERTY DETAILS */

const container = document.getElementById("propertyDetails");

container.innerHTML = `

<h1>${property.title}</h1>

<div class="property-price">
₹${property.price.toLocaleString()}
</div>

<p class="property-meta">

📍 <b>Location:</b> ${property.location}<br><br>

🏠 <b>Rooms:</b> ${property.rooms} BHK<br>

📐 <b>Area:</b> ${property.area}<br>

🛁 <b>Bathrooms:</b> ${property.bath}<br>

🏢 <b>Type:</b> ${property.type}

</p>

<h3>Description</h3>

<p>${property.description}</p>


<div class="contact-box">

<h3>Contact Owner</h3>

<p>Owner: HouseHunt Verified Seller</p>

<p>Phone: +91 98765 43210</p>

<button class="wish-btn" onclick="addToWishlist()">
<i class="fa-solid fa-heart"></i> Add to Wishlist
</button>
</div>

`;

</script>
<script src="js/search.js"></script>
<script src="js/properties.js"></script>
<script src ="js/wishlist.js"></script>
<script src="js/main.js"></script>
<script src="js/slider.js"></script>
<script src="js/user.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
