<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Owner Panel | HouseHunt</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="logo">
HouseHunt
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="admin.html">Admin</a></li>
<li><a href="renter.html">Renter</a></li>
<li><a href="owner.html">Owner</a></li>
<li><a href="wishlist.html">Wishlist</a></li>

<li id="loginNav">
<a href="login.html" class="login-btn">Login</a>
</li>

<li id="userNav" class="user-nav" style="display:none;">
<div class="user-box">
<span id="userName"></span>
<button onclick="logoutUser()" class="logout-btn">
Logout
</button>
</div>
</li>

</ul>
</nav>


<section class="owner-panel">

<h1>Owner Dashboard</h1>

<!-- TABS -->

<div class="owner-tabs">

<button onclick="openOwnerTab('addProperty')">
Add Property
</button>

<button onclick="openOwnerTab('allProperties')">
All Properties
</button>

<button onclick="openOwnerTab('ownerBookings')">
Owner Bookings
</button>

</div>



<!-- TAB 1 ADD PROPERTY -->

<div id="addProperty" class="owner-tab">

<h2>Add Property</h2>

<select id="ptype">
<option>Residential</option>
<option>Commercial</option>
</select>

<select id="adtype">
<option>Rent</option>
<option>Sale</option>
</select>

<input id="address" placeholder="Property Address">

<input id="contact" placeholder="Owner Contact">

<input id="price" placeholder="Amount">

<textarea id="details" placeholder="Additional Details"></textarea>

<button onclick="addProperty()">
Submit Property
</button>

</div>



<!-- TAB 2 ALL PROPERTIES -->

<div id="allProperties" class="owner-tab">

<h2>All Properties</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Type</th>
<th>Ad Type</th>
<th>Address</th>
<th>Contact</th>
<th>Amount</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="ownerPropertyTable"></tbody>

</table>

</div>



<!-- TAB 3 BOOKINGS -->

<div id="ownerBookings" class="owner-tab">

<h2>Owner Bookings</h2>

<table>

<thead>

<tr>
<th>Booking ID</th>
<th>Property ID</th>
<th>Tenant</th>
<th>Phone</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</section>

<script src="js/owner.js"></script>
<script src="js/user.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
