<link rel="stylesheet" href="css/style.css">

</head>

<body>
<!-- NAVBAR -->
<nav class="navbar">
<div class="logo">
HouseHunt
</div>
<ul class="nav-links">

</button>

<li id="loginNav">
<a href="login.html" class="login-btn">Login</a>
</li>

<span id="userName"></span>

</button></div></li></ul></nav>
</header>


<section class="auth-page">

<div class="auth-container">

<div class="form-box">

<h2>Login to HouseHunt</h2>

<input id="loginEmail" type="email" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button onclick="loginUser()" class="auth-btn">Login</button>

<p id="loginMessage" class="form-message"></p>

<p class="switch-text">
Don't have an account?
<a onclick="showSignup()">Create Account</a>
</p>

</div>



<div class="form-box hidden" id="signupBox">

<h2>Create Account</h2>

<input id="signupName" type="text" placeholder="Full Name">

<input id="signupEmail" type="email" placeholder="Email">

<input id="signupPhone" type="tel" placeholder="Phone Number">

<input id="signupPassword" type="password" placeholder="Password">

<input id="signupConfirm" type="password" placeholder="Confirm Password">

<button onclick="signupUser()" class="auth-btn">Create Account</button>

<p id="signupMessage" class="form-message"></p>

<p class="switch-text">
Already have an account?
<a onclick="showLogin()">Login</a>
</p>

</div>

</div>

</section>

<script src="js/auth.js"></script>
<script src="js/properties.js"></script>
<script src="js/main.js"></script>
<script src="js/slider.js"></script>

<script src="js/theme.js"></script>

</body>
