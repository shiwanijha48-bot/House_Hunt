<section class="renter-panel">
<h1>Renter Dashboard</h1>

<!-- TABS -->

<div class="renter-tabs">
<button onclick="openRenterTab('browseTab')">Browse Properties</button>
<button onclick="openRenterTab('bookingTab')">Booking History</button>
</div>


<!-- BROWSE TAB -->

<div id="browseTab" class="renter-tab">
<h2>Browse Properties</h2>
<br>
<div class="renter-filters">
<input id="searchAddress" placeholder="Search by address">

<select id="typeFilter">
<option value="">Property Type</option>
<option>Apartment</option>
<option>House</option>
<option>Builder Floor</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

<div id="propertyContainer" class="property-grid"></div>

</div>



<!-- BOOKING TAB -->

<div id="bookingTab" class="renter-tab">

<h2>Your Booking History</h2>

<table>

<thead>

<tr>

<th>Booking ID</th>
<th>Property ID</th>
<th>Tenant</th>
<th>Phone</th>
<th>Status</th>

</tr>

</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</section>
