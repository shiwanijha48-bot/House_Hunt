<section class="browse">

<h1>Browse Properties</h1>

<div class="filters">

<input id="searchInput" placeholder="Search by city or title">

<input id="priceFilter" type="number" placeholder="Max Price">

<input id="roomFilter" type="number" placeholder="Min Rooms">

<button onclick="searchProperties()">Search</button>

</div>


<div id="propertyContainer" class="property-grid"></div>

</section>



<script src="js/properties.js"></script>
<script src="js/search.js"></script>


<script>

function displayProperties(list){

const container = document.getElementById("propertyContainer");

container.innerHTML = "";

list.forEach(p => {

container.innerHTML += `

<div class="property-card">

<div class="image-box">

<img src="${p.image}">

<button onclick="addToWishlist(${p.id})" class="wish-btn">
 Wishlist
</button>

</div>

<div class="property-info">

<h3>${p.title}</h3>

<p>${p.city}</p>

<div class="property-price">
₹${p.price.toLocaleString()}
</div>

<p>
${p.rooms} BHK • ${p.area}
</p>

<a href="property.html?id=${p.id}" class="view-btn">
View Details
</a>

</div>

</div>

`;

});
