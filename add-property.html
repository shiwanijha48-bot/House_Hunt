<section class="add-property">
<div class="form-wrapper">
<h1>Add New Property</h1>
<p class="subtitle">List your property and reach thousands of buyers</p>
<form id="propertyForm">

<div class="form-grid">

<div class="form-group">
<label>Property Title</label>
<input type="text" id="title" placeholder="Luxury 3BHK Apartment" required>
</div>

<div class="form-group">
<label>City / Location</label>
<input type="text" id="city" placeholder="Delhi, Mumbai, Bangalore" required>
</div>

<div class="form-group">
<label>Price (₹)</label>
<input type="number" id="price" required>
</div>

<div class="form-group">
<label>Bedrooms</label>
<input type="number" id="rooms">
</div>

<div class="form-group">
<label>Area (sqft)</label>
<input type="text" id="area">
</div>

<div class="form-group">
<label>Property Type</label>

<select id="type">
<option>Apartment</option>
<option>Villa</option>
<option>Independent House</option>
<option>Builder Floor</option>
</select>

</div>

<div class="form-group">
<label>Property Status</label>

<select id="status">
<option>For Sale</option>
<option>For Rent</option>
</select>

</div>

</div>


<h2>Property Images</h2>

<div class="form-group">
<input type="file" id="images" multiple>
<div id="preview"></div>
</div>


<h2>Property Description</h2>

<textarea id="desc" rows="5" placeholder="Describe your property"></textarea>


<h2>Amenities</h2>

<div class="amenities">

<label><input type="checkbox" value="Parking"> Parking</label>
<label><input type="checkbox" value="Gym"> Gym</label>
<label><input type="checkbox" value="Lift"> Lift</label>
<label><input type="checkbox" value="Security"> Security</label>
<label><input type="checkbox" value="Swimming Pool"> Swimming Pool</label>

</div>


<h2>Owner Details</h2>

<div class="form-grid">

<div class="form-group">
<label>Owner Name</label>
<input type="text" id="ownerName">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="ownerPhone">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="ownerEmail">
</div>

<div class="form-group">
<label>Full Address</label>
<input type="text" id="address">
</div>

</div>

<button type="submit" class="submit-btn">
Upload Property
</button>

</form>

</div>
